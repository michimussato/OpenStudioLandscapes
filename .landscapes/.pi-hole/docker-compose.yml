networks:
  pi-hole:
    name: network_pi-hole
services:
  pihole-unbound:
    cap_add: []
    container_name: pihole-unbound
    domainname: farm.evil
    environment:
      FTLCONF_dns_dnssec: 'true'
      FTLCONF_dns_listeningMode: all
      FTLCONF_dns_upstreams: 127.0.0.1#5335
      FTLCONF_webserver_api_password: myp4ssword
      FTLCONF_webserver_interface_theme: default-dark
      REV_SERVER: 'false'
      TZ: Europe/Zurich
    hostname: pihole-unbound.farm.evil
    image: docker.io/mpgirro/pihole-unbound:latest
    networks:
    - pi-hole
    ports:
    - 53:53/tcp
    - 53:53/udp
    - 81:80/tcp
    - 443:443/tcp
    restart: unless-stopped
    volumes:
    - /home/michael/git/repos/OpenStudioLandscapes/.landscapes/.pi-hole/etc-pihole:/etc/pihole:rw
    - /home/michael/git/repos/OpenStudioLandscapes/.landscapes/.pi-hole/etc-dnsmasq:/etc/dnsmasq.d:rw
