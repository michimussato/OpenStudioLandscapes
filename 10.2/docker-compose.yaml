services:
  mongo-express-10-2:
    container_name: mongo-express-10-2
    hostname: mongo-express-10-2
    domainname: ${ROOT_DOMAIN}
    depends_on:
      - mongodb-10-2
    # https://hub.docker.com/_/mongo-express
    # https://github.com/mongo-express/mongo-express
    image: mongo-express
    networks:
      - mongodb
    restart: always  # fixes MongoNetworkError when mongodb is not ready when mongo-express starts
    ports:
      - "${MONGO_EXPRESS_PORT_HOST}:${MONGO_EXPRESS_PORT_CONTAINER}"
    env_file:
      - .env
    volumes:
      - ${NFS_ENTRY_POINT}/test_data/10.2/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      # Read Only
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT}:ro
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT_LNS}:ro



  # https://github.com/hurlenko/filebrowser-docker
  # https://filebrowser.org/cli/filebrowser#options
  filebrowser:
    container_name: mongo-filebrowser-10-2
    hostname: mongo-filebrowser-10-2
    domainname: ${ROOT_DOMAIN}
    image: filebrowser/filebrowser
    restart: always
    env_file:
      - .env
    networks:
      - repository
    depends_on:
      - mongodb-10-2
    volumes:
      # By default, we already have a configuration file with some
      # defaults so you can just mount the root and the database.
      # Although you can overwrite by mounting a directory with a
      # new config file. If you don't already have a database file,
      # make sure to create a new empty file under the path you specified.
      # Otherwise, Docker will create an empty folder instead of an
      # empty file, resulting in an error when mounting the database
      - ./databases/filebrowser/filebrowser.db:/filebrowser.db
      - ./configs/filebrowser/filebrowser.json:/.filebrowser.json
      # Read Only
      - ${NFS_ENTRY_POINT}/test_data/10.2/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data:ro
#      - ${NFS_ENTRY_POINT_LNS}:${NFS_ENTRY_POINT_LNS}:ro
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT}:ro
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT_LNS}:ro
    ports:
      - "${FILEBROWSER_PORT_HOST}:${FILEBROWSER_PORT_CONTAINER}"



  mongodb-10-2:
    container_name: mongodb-10-2
    hostname: mongodb-10-2
    domainname: ${ROOT_DOMAIN}
    # https://hub.docker.com/layers/mongodb/mongodb-community-server/4.4-ubuntu2004/images/sha256-e2fd10d7979ee1c5565e5b37ad1ae62056dc5c0df8adb7fbff3b8a3409b55dad?context=explore
    image: mongodb/mongodb-community-server:4.4-ubuntu2004
    # https://docs.docker.com/reference/compose-file/services/#command
    networks:
      - mongodb
      - repository
    env_file:
      - .env
    command: >
      --dbpath /opt/Thinkbox/DeadlineDatabase10/mongo/data
      --bind_ip_all
      --noauth
      --storageEngine wiredTiger
      --tlsMode disabled
    ports:
      - "${MONGO_DB_PORT_HOST}:${MONGO_DB_PORT_CONTAINER}"
    volumes:
      - ${NFS_ENTRY_POINT}/test_data/10.2/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      # Read Only
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT}:ro
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT_LNS}:ro



  dagster_dev:
    env_file:
      - .env
    container_name: dagster-dev-10-2
    hostname: dagster-dev-10-2
    domainname: ${ROOT_DOMAIN}
    restart: always
    networks:
      - repository
      - mongodb
    build:
      context: .
      dockerfile: ./Dockerfile
      target: dagster_dev
      args:
        - PYTHON_MAJ
        - PYTHON_MIN
        - PYTHON_PAT
    volumes:
      # By default, we already have a configuration file with some
      - ./configs/dagster_shared/workspace.yaml:/dagster/workspace.yaml:ro
      - ./configs/dagster_shared/dagster.yaml:/dagster/materializations/workspace.yaml:ro
      # - ${NFS_ENTRY_POINT}/test_data/10.2/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data:ro
#      - ${NFS_ENTRY_POINT_LNS}:${NFS_ENTRY_POINT_LNS}
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT}
      - ${NFS_ENTRY_POINT}:${NFS_ENTRY_POINT_LNS}
    ports:
      - "${DAGSTER_DEV_PORT_HOST}:${DAGSTER_DEV_PORT_CONTAINER}"



#  likec4_dev:
#    container_name: likec4-dev-10-2
#    hostname: likec4-dev-10-2
#    domainname: ${ROOT_DOMAIN}
#    env_file:
#      - .env
#    restart: always
#    build:
#      context: .
#      dockerfile: ./Dockerfile
#      target: likec4_dev
#      args:
