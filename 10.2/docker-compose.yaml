services:
  mongodb-10-2:
    container_name: mongodb-10-2
    hostname: mongodb-10-2
    domainname: farm.evil
    # https://hub.docker.com/layers/mongodb/mongodb-community-server/4.4-ubuntu2004/images/sha256-e2fd10d7979ee1c5565e5b37ad1ae62056dc5c0df8adb7fbff3b8a3409b55dad?context=explore
    image: mongodb/mongodb-community-server:4.4-ubuntu2004
    # https://docs.docker.com/reference/compose-file/services/#command
    networks:
      - mongodb
      - repository
    command: >
      --dbpath /opt/Thinkbox/DeadlineDatabase10/mongo/data
      --bind_ip_all
      --noauth
      --storageEngine wiredTiger
      --tlsMode disabled
    ports:
      - "27017:27017"
    # environment:
    #   - MONGO_INITDB_ROOT_USERNAME=admin
    #   - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      # # NAMED
      # - mongo-data-10-2-test:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      # LOCAL
      - ./test_data/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      - /data/share/nfs:/data/share/nfs:ro
      - /data/share/nfs:/nfs:ro


  mongo-express:
    container_name: mongo-express-10-2
    hostname: mongo-express-10-2
    domainname: farm.evil
    depends_on:
      - mongodb-10-2
    # https://hub.docker.com/_/mongo-express
    # https://github.com/mongo-express/mongo-express
    image: mongo-express
    networks:
      - mongodb
    restart: always  # fixes MongoNetworkError when mongodb is not ready when mongo-express starts
    ports:
      - "8080:8081"
    environment:
      - ME_CONFIG_BASICAUTH_USERNAME=web
      - ME_CONFIG_BASICAUTH_PASSWORD=web
      - ME_CONFIG_OPTIONS_EDITORTHEME=darcula
      - ME_CONFIG_MONGODB_SERVER=mongodb-10-2
      # - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      # - ME_CONFIG_MONGODB_ADMINPASSWORD=password
    volumes:
      # # /var/lib/docker/volumes/mongodb_mongo-data-10-2/_data
      # - mongo-data-10-2-test:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      - ./test_data/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data
      - /data/share/nfs:/data/share/nfs:ro
      - /data/share/nfs:/nfs:ro


  # https://github.com/hurlenko/filebrowser-docker
  # https://filebrowser.org/cli/filebrowser#options
  filebrowser:
    container_name: mongo-filebrowser-10-2
    hostname: mongo-filebrowser-10-2
    domainname: farm.evil
    image: filebrowser/filebrowser
    restart: always
    networks:
      - repository
    depends_on:
      - mongodb-10-2
    volumes:
      # - mongo-data-10-2-test:/opt/Thinkbox/DeadlineDatabase10/mongo/data:ro
      - ./test_data/opt/Thinkbox/DeadlineDatabase10/mongo/data_LOCAL:/opt/Thinkbox/DeadlineDatabase10/mongo/data:ro
      - /nfs:/nfs:ro
      # By default, we already have a configuration file with some
      # defaults so you can just mount the root and the database.
      # Although you can overwrite by mounting a directory with a
      # new config file. If you don't already have a database file,
      # make sure to create a new empty file under the path you specified.
      # Otherwise, Docker will create an empty folder instead of an
      # empty file, resulting in an error when mounting the database
      - ./filebrowser/filebrowser.db:/filebrowser.db
      - ./filebrowser/filebrowser.json:/.filebrowser.json
      - /data/share/nfs:/data/share/nfs:ro
      - /data/share/nfs:/nfs:ro
    ports:
      - "80:80"


  deadline-repository-installer-10-2  :
    restart: "no"
    container_name: deadline-repository-installer-10-2
    hostname: deadline-repository-installer10-2
    domainname: farm.evil
    depends_on:
      - mongodb-10-2
    networks:
      - mongodb
      - repository
    build:
      context: .
      dockerfile: ./DeadlineRepository/Dockerfile
      target: repo_installer
      args:
        - DEADLINE_VERSION=$DEADLINE_VERSION
        # - DEADLINE_INSTALLER_BASE=$DEADLINE_INSTALLER_BASE
