  deadline-webservice-installer-10-2:
    restart: "no"
    container_name: webservice-installer-10-2
    hostname: webservice-installer-10-2
    domainname: farm.evil
    depends_on:
      deadline-repository-installer-10-2:
        condition: service_completed_successfully
    networks:
      - mongodb
      - repository
    build:
      context: .
      dockerfile: ./DeadlineRepository/Dockerfile
      target: webservice_installer
      args:
        - DEADLINE_VERSION=$DEADLINE_VERSION
        - PYTHON_VERSION=$PYTHON_VERSION
    volumes:
      - /data/share/nfs/test_data/10.2/opt/Thinkbox/Deadline10/webservice-installer-10-2:/opt/Thinkbox/Deadline10
      # Read Only
      - /data/share/nfs/test_data/10.2/opt/Thinkbox/DeadlineRepository10:/opt/Thinkbox/DeadlineRepository10  # ro?
      - /data/share/nfs:/data/share/nfs:ro
      - /data/share/nfs:/nfs:ro


  deadline-webservice-runner:
    restart: always
    build:
      context: .
      dockerfile: ./DeadlineRepository/Dockerfile
      args:
        - DEADLINE_VERSION=$DEADLINE_VERSION
        - PYTHON_VERSION=$PYTHON_VERSION
      target: webservice_runner
    container_name: webservice-runner-10-2
    hostname: webservice-runner-10-2
    domainname: farm.evil
    depends_on:
