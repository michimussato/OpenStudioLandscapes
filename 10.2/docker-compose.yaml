      - /data/share/nfs/test_data/10.2/opt/Thinkbox/Deadline10/webservice-installer-10-2:/opt/Thinkbox/Deadline10
      - /data/share/nfs/test_data/10.2/opt/Thinkbox/DeadlineRepository10:/opt/Thinkbox/DeadlineRepository10
      - /data/share/nfs:/data/share/nfs:ro
      - /data/share/nfs:/nfs:ro
    ports:
      - "8899:8899"


