name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - 
        uses: actions/checkout@v4
        name: Build the Docker image
        # run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
      -
        run: docker build --file docker/Dockerfile --tag docker.io/michimussato/openstudiolandscapes:$(date +%s) --tag docker.io/michimussato/openstudiolandscapes:latest --progress plain --no-cache-filter=openstudiolandscapes-never-cache . --build-arg PYTHON_MAJ=3 --build-arg PYTHON_MIN=11 --build-arg PYTHON_PAT=11 --build-arg DOCKER_GID=959
